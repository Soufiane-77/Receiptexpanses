name: Deploy to Cloudflare Workers

# Builds the OpenNext bundle and deploys the Worker on Linux (workerd does not
# run reliably on the maintainer's Windows machine). Runs on every push to main
# and can also be triggered manually from the Actions tab.
on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      # Account ID is not a credential; the API token is what gates access.
      CLOUDFLARE_ACCOUNT_ID: "139d6b0c79aa3f797879743fd5e4d7af"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Apply D1 migrations (remote)
        run: npx wrangler d1 migrations apply receiptexpanses-db --remote

      - name: Build & deploy
        run: npm run deploy
